name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Smoke test (imports/compile)
        run: |
          python -m compileall main.py ingest_transcripts_to_rag.py download_youtube_transcripts.py

  deploy:
    name: Deploy to Render
    needs: ci
    # Only deploy on pushes to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deploy."
            exit 0
          fi
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"

