name: CI/CD Pipeline - FastAPI App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ====================== 1. CI - Testing Job ======================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke Test (Import & Compile Check)
        run: |
          python -m compileall main.py ingest_transcripts_to_rag.py download_youtube_transcripts.py

      - name: Run Full Test Suite (if tests folder exists)
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --cov=app --cov-report=term-missing
          else
            echo "No tests folder found. Skipping pytest."
          fi

  # ====================== 2. CD - Deploy Job ======================
  deploy:
    name: Deploy to Render
    needs: test                    # Only run if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "❌ ERROR: RENDER_DEPLOY_HOOK_URL secret is not set!"
            exit 1
          fi

          echo "🚀 Triggering deployment on Render..."
          curl -X POST "$RENDER_DEPLOY_HOOK_URL" --fail-with-body

          echo "✅ Deployment triggered successfully on Render!"
